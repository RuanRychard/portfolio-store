  <text x="528" y="68" fill="#c9d4e4" font-family="Montserrat, Arial, sans-serif" font-size="17" font-weight="700">Home</text>
  <text x="604" y="68" fill="#ffffff" font-family="Montserrat, Arial, sans-serif" font-size="17" font-weight="700">Produtos</text>
  <text x="706" y="68" fill="#c9d4e4" font-family="Montserrat, Arial, sans-serif" font-size="17" font-weight="700">Contato</text>
  <rect x="1136" y="38" width="88" height="40" rx="8" fill="#00f7ff"/>
  <text x="1160" y="64" fill="#071018" font-family="Montserrat, Arial, sans-serif" font-size="15" font-weight="900">Entrar</text>

  <g filter="url(#shadow)">
