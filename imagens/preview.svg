  <text x="664" y="380" fill="#ffffff" font-family="Orbitron, Montserrat, Arial, sans-serif" font-size="64" font-weight="900">Series 10</text>
  <text x="664" y="430" fill="#c9d4e4" font-family="Montserrat, Arial, sans-serif" font-size="20" font-weight="500">Carrossel automático, modal de produto,</text>
