    <rect x="255" y="227" width="194" height="240" rx="42" fill="#060912" stroke="#00f7ff" stroke-opacity="0.55" stroke-width="3"/>
    <circle cx="352" cy="348" r="58" fill="none" stroke="#00f7ff" stroke-width="10" opacity="0.9"/>
    <path d="M352 298v54l38 30" fill="none" stroke="#f72585" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="664" y="240" fill="#00f7ff" font-family="Montserrat, Arial, sans-serif" font-size="16" font-weight="900">NOVO LANÇAMENTO</text>
