<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Portfolio Store preview</title>
  <desc id="desc">Preview visual da vitrine tech Portfolio Store.</desc>
  <defs>
    <radialGradient id="cyanGlow" cx="50%" cy="48%" r="50%">
      <stop offset="0%" stop-color="#00f7ff" stop-opacity="0.46"/>
      <stop offset="70%" stop-color="#003d64" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#1f1f3a"/>
    </linearGradient>
    <linearGradient id="button" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f7ff"/>
      <stop offset="100%" stop-color="#76faff"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="26" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="632" cy="354" r="260" fill="url(#cyanGlow)"/>
  <circle cx="152" cy="156" r="118" fill="none" stroke="#00f7ff" stroke-opacity="0.18"/>
  <circle cx="1102" cy="176" r="84" fill="none" stroke="#00f7ff" stroke-opacity="0.18"/>
  <circle cx="1014" cy="572" r="122" fill="none" stroke="#00f7ff" stroke-opacity="0.15"/>
  <circle cx="808" cy="128" r="150" fill="#f72585" opacity="0.12"/>

